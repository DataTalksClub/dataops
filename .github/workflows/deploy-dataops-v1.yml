name: Deploy DataOps V1 Lambda

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/deploy-dataops-v1.yml"
      - "content/**"
      - "frontend/**"
      - "lambda-functions/**"
      - "scripts/**"
      - "tests/docs_app/**"
      - "work-engine/**"
      - "Makefile"
      - "package.json"
      - "package-lock.json"
      - "pyproject.toml"
      - "uv.lock"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: dataops-v1-deploy
  cancel-in-progress: false

env:
  AWS_REGION: eu-west-1
  AWS_DEFAULT_REGION: eu-west-1
  AWS_ROLE_ARN: arn:aws:iam::817685572750:role/dataops-github-actions-deploy
  DOCS_GITHUB_OWNER: DataTalksClub
  DOCS_GITHUB_REPO: dataops
  DOCS_GITHUB_BRANCH: main
  BASIC_AUTH_USERNAME: admin

jobs:
  checks:
    name: Check DataOps v1 app
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Install Python
        run: uv python install

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Run docs app tests
        run: uv run --project lambda-functions --extra search --with pytest python -m pytest tests/docs_app

      - name: Install docs Playwright Chromium
        run: uv run --project lambda-functions --with playwright python -m playwright install --with-deps chromium

      - name: Run browser-backed docs portal flow
        run: uv run --project lambda-functions --extra search --with pytest --with playwright python -m pytest tests/docs_app/test_playwright_local_docs_flow.py

      - name: Install Node workspace dependencies
        run: npm ci

      - name: Install work-engine Playwright Chromium
        run: npm exec --workspace dataops-work-engine -- playwright install --with-deps chromium

      - name: Run work-engine tests
        run: npm --prefix work-engine test

      - name: Typecheck work-engine
        run: npm --prefix work-engine run typecheck

      - name: Build work-engine
        run: npm --prefix work-engine run build

      - name: Run work-engine Playwright E2E
        run: npm --prefix work-engine run test:e2e

      - name: Upload work-engine Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: work-engine-playwright-artifacts
          path: |
            work-engine/playwright-report/
            work-engine/test-results/
          if-no-files-found: ignore
          retention-days: 7

      - name: Build search index
        working-directory: lambda-functions
        run: |
          mkdir -p ../.tmp
          uv run --extra search python -m lambda_functions.build_search_index \
            --docs-dir ../content \
            --output ../.tmp/dataops-content-search.index

      - name: Smoke test search handler against built index
        working-directory: lambda-functions
        env:
          SEARCH_INDEX_PATH: ../.tmp/dataops-content-search.index
        run: |
          uv run --extra search python - <<'PY'
          import json
          from lambda_functions import search_handler

          search_handler.reset_index()
          response = search_handler.handler(
              {
                  "rawPath": "/search",
                  "requestContext": {"http": {"method": "GET"}},
                  "queryStringParameters": {"q": "workflow", "limit": "5"},
              },
              None,
          )
          assert response["statusCode"] == 200, response
          body = json.loads(response["body"])
          assert body["results"], body
          first = body["results"][0]
          assert first["id"] and first["path"] and first["title"], first
          PY

      - name: Smoke test full app handler
        working-directory: lambda-functions
        env:
          BASIC_AUTH_PASSWORD: smoke-test-password
          BASIC_AUTH_USERNAME: smoke-test-user
        run: |
          uv run --extra search python - <<'PY'
          from lambda_functions.full_app_handler import handler

          login = handler(
              {
                  "rawPath": "/login",
                  "requestContext": {"http": {"method": "GET"}},
              },
              None,
          )
          assert login["statusCode"] == 200, login

          protected = handler(
              {
                  "rawPath": "/",
                  "requestContext": {"http": {"method": "GET"}},
              },
              None,
          )
          assert protected["statusCode"] == 302, protected
          assert protected["headers"]["location"] == "/login", protected
          PY

      - name: Set up SAM
        uses: aws-actions/setup-sam@v3
        with:
          use-installer: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate SAM template
        working-directory: lambda-functions
        run: sam validate --template-file template.full.yaml

      - name: Build SAM artifact
        working-directory: lambda-functions
        run: sam build --config-env full-sandbox

  deploy:
    name: Deploy DataOps v1 app
    runs-on: ubuntu-latest
    needs: checks
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: lambda-functions

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Install Python
        run: uv python install

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install Node workspace dependencies
        run: npm ci
        working-directory: ${{ github.workspace }}

      - name: Set up SAM
        uses: aws-actions/setup-sam@v3
        with:
          use-installer: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          role-session-name: dataops-v1-deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Build SAM artifact
        run: sam build --config-env full-sandbox

      - name: Deploy DataOps v1 stack
        run: |
          sam deploy \
            --config-env full-sandbox \
            --parameter-overrides \
              "ParameterKey=GitHubOwner,ParameterValue=$DOCS_GITHUB_OWNER" \
              "ParameterKey=GitHubRepo,ParameterValue=$DOCS_GITHUB_REPO" \
              "ParameterKey=GitHubBranch,ParameterValue=$DOCS_GITHUB_BRANCH" \
              "ParameterKey=BasicAuthUsername,ParameterValue=$BASIC_AUTH_USERNAME"

      - name: Seed runtime users and workflow templates
        working-directory: ${{ github.workspace }}/work-engine
        run: |
          export DATAOPS_USERS_TABLE="$(aws cloudformation describe-stacks \
            --stack-name dataops-v1 \
            --query "Stacks[0].Outputs[?OutputKey=='DataOpsUsersTableName'].OutputValue" \
            --output text)"
          export DATAOPS_TEMPLATES_TABLE="$(aws cloudformation describe-stacks \
            --stack-name dataops-v1 \
            --query "Stacks[0].Outputs[?OutputKey=='DataOpsTemplatesTableName'].OutputValue" \
            --output text)"
          npm exec -- tsx scripts/seed-users.ts
          npm exec -- tsx scripts/seed-templates.ts

      - name: Smoke test deployed docs full app
        run: |
          docs_url="$(aws cloudformation describe-stacks \
            --stack-name dataops-v1 \
            --query "Stacks[0].Outputs[?OutputKey=='DocsFullAppUrl'].OutputValue" \
            --output text)"
          python - "$docs_url" <<'PY'
          import sys
          from urllib.error import HTTPError
          from urllib.request import HTTPRedirectHandler, build_opener

          class NoRedirect(HTTPRedirectHandler):
              def redirect_request(self, req, fp, code, msg, headers, newurl):
                  return None

          base_url = sys.argv[1].rstrip("/")
          opener = build_opener(NoRedirect)

          login = opener.open(f"{base_url}/login")
          assert login.status == 200, login.status

          try:
              opener.open(f"{base_url}/")
          except HTTPError as exc:
              assert exc.code == 302, exc.code
              assert exc.headers["location"] == "/login", exc.headers
          else:
              raise AssertionError("Protected root did not redirect to /login")
          PY

      - name: Smoke test deployed workflow templates
        run: |
          function_name="$(aws cloudformation describe-stacks \
            --stack-name dataops-v1 \
            --query "Stacks[0].Outputs[?OutputKey=='WorkEngineFunctionName'].OutputValue" \
            --output text)"
          portal_secret_name="$(aws cloudformation describe-stacks \
            --stack-name dataops-v1 \
            --query "Stacks[0].Outputs[?OutputKey=='WorkEnginePortalSecretName'].OutputValue" \
            --output text)"
          portal_secret="$(aws secretsmanager get-secret-value \
            --secret-id "$portal_secret_name" \
            --query SecretString \
            --output text)"
          python - "$portal_secret" <<'PY'
          import json
          import sys
          from pathlib import Path

          Path("/tmp/work-engine-templates-payload.json").write_text(json.dumps({
              "httpMethod": "GET",
              "path": "/api/templates",
              "headers": {
                  "x-portal-auth": "true",
                  "x-portal-secret": sys.argv[1],
              },
          }))
          PY
          aws lambda invoke \
            --function-name "$function_name" \
            --payload fileb:///tmp/work-engine-templates-payload.json \
            /tmp/work-engine-templates.json
          python - <<'PY'
          import json
          from pathlib import Path

          response = json.loads(Path("/tmp/work-engine-templates.json").read_text())
          assert response["statusCode"] == 200, response
          payload = json.loads(response["body"])
          templates = payload.get("templates") or []
          assert len(templates) >= 11, payload
          assert any(template.get("type") == "podcast" for template in templates), payload
          assert any(template.get("type") == "newsletter" for template in templates), payload
          PY

      - name: Smoke test private work engine Lambda
        run: |
          function_name="$(aws cloudformation describe-stacks \
            --stack-name dataops-v1 \
            --query "Stacks[0].Outputs[?OutputKey=='WorkEngineFunctionName'].OutputValue" \
            --output text)"
          printf '%s' '{"httpMethod":"GET","path":"/api/health"}' > /tmp/work-engine-health-payload.json
          aws lambda invoke \
            --function-name "$function_name" \
            --payload fileb:///tmp/work-engine-health-payload.json \
            /tmp/work-engine-health.json
          python - <<'PY'
          import json
          from pathlib import Path

          response = json.loads(Path("/tmp/work-engine-health.json").read_text())
          assert response["statusCode"] == 200, response
          assert json.loads(response["body"]) == {"status": "ok"}, response
          PY
