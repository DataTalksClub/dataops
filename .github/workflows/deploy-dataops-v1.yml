name: Deploy DataOps V1 Lambda

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/deploy-dataops-v1.yml"
      - "backend/**"
      - "content/**"
      - "frontend/**"
      - "infra/**"
      - "Makefile"
      - "package.json"
      - "package-lock.json"
      - "samconfig.toml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: dataops-v1-deploy
  cancel-in-progress: false

env:
  AWS_REGION: eu-west-1
  AWS_DEFAULT_REGION: eu-west-1
  AWS_ROLE_ARN: arn:aws:iam::817685572750:role/dataops-github-actions-deploy
  DOCS_GITHUB_OWNER: DataTalksClub
  DOCS_GITHUB_REPO: dataops
  DOCS_GITHUB_BRANCH: main
  BASIC_AUTH_USERNAME: admin

jobs:
  checks:
    name: Check DataOps v1 app
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install Node workspace dependencies
        run: npm ci

      - name: Install backend Playwright Chromium
        run: npm exec --workspace dataops-backend -- playwright install --with-deps chromium

      - name: Run backend tests
        run: npm --prefix backend test

      - name: Typecheck backend
        run: npm --prefix backend run typecheck

      - name: Build backend
        run: npm --prefix backend run build

      - name: Run backend Playwright E2E
        run: npm --prefix backend run test:e2e

      - name: Upload backend Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: backend-playwright-artifacts
          path: |
            backend/playwright-report/
            backend/test-results/
          if-no-files-found: ignore
          retention-days: 7

      - name: Set up SAM
        uses: aws-actions/setup-sam@v3
        with:
          use-installer: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate SAM template
        run: make sam-validate

      - name: Build SAM artifact
        run: make sam-build

  deploy:
    name: Deploy DataOps v1 app
    runs-on: ubuntu-latest
    needs: checks
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install Node workspace dependencies
        run: npm ci

      - name: Set up SAM
        uses: aws-actions/setup-sam@v3
        with:
          use-installer: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          role-session-name: dataops-v1-deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Build SAM artifact
        run: make sam-build

      - name: Deploy DataOps v1 stack
        run: |
          sam deploy \
            --config-env full-sandbox \
            --parameter-overrides \
              "ParameterKey=GitHubOwner,ParameterValue=$DOCS_GITHUB_OWNER" \
              "ParameterKey=GitHubRepo,ParameterValue=$DOCS_GITHUB_REPO" \
              "ParameterKey=GitHubBranch,ParameterValue=$DOCS_GITHUB_BRANCH" \
              "ParameterKey=BasicAuthUsername,ParameterValue=$BASIC_AUTH_USERNAME"

      - name: Seed runtime users, workflow templates, and recurring configs
        working-directory: ${{ github.workspace }}/backend
        run: |
          export DATAOPS_TASKS_TABLE="$(aws cloudformation describe-stacks \
            --stack-name dataops-v1 \
            --query "Stacks[0].Outputs[?OutputKey=='DataOpsTasksTableName'].OutputValue" \
            --output text)"
          export DATAOPS_USERS_TABLE="$(aws cloudformation describe-stacks \
            --stack-name dataops-v1 \
            --query "Stacks[0].Outputs[?OutputKey=='DataOpsUsersTableName'].OutputValue" \
            --output text)"
          export DATAOPS_TEMPLATES_TABLE="$(aws cloudformation describe-stacks \
            --stack-name dataops-v1 \
            --query "Stacks[0].Outputs[?OutputKey=='DataOpsTemplatesTableName'].OutputValue" \
            --output text)"
          npm exec -- tsx scripts/seed-users.ts
          npm exec -- tsx scripts/seed-templates.ts
          npm exec -- tsx scripts/seed-recurring.ts

      - name: Smoke test deployed single-origin backend
        run: |
          backend_url="$(aws cloudformation describe-stacks \
            --stack-name dataops-v1 \
            --query "Stacks[0].Outputs[?OutputKey=='BackendUrl'].OutputValue" \
            --output text)"
          python3 - "$backend_url" <<'PY'
          import sys
          from urllib.error import HTTPError
          from urllib.request import HTTPRedirectHandler, build_opener

          class NoRedirect(HTTPRedirectHandler):
              def redirect_request(self, req, fp, code, msg, headers, newurl):
                  return None

          base_url = sys.argv[1].rstrip("/")
          opener = build_opener(NoRedirect)

          login = opener.open(f"{base_url}/login")
          assert login.status == 200, login.status

          try:
              opener.open(f"{base_url}/")
          except HTTPError as exc:
              assert exc.code == 302, exc.code
              assert exc.headers["location"] == "/login", exc.headers
          else:
              raise AssertionError("Protected root did not redirect to /login")
          PY

      - name: Smoke test deployed workflow templates
        run: |
          function_name="$(aws cloudformation describe-stacks \
            --stack-name dataops-v1 \
            --query "Stacks[0].Outputs[?OutputKey=='BackendFunctionName'].OutputValue" \
            --output text)"
          portal_secret_name="$(aws cloudformation describe-stacks \
            --stack-name dataops-v1 \
            --query "Stacks[0].Outputs[?OutputKey=='WorkEnginePortalSecretName'].OutputValue" \
            --output text)"
          portal_secret="$(aws secretsmanager get-secret-value \
            --secret-id "$portal_secret_name" \
            --query SecretString \
            --output text)"
          python3 - "$portal_secret" <<'PY'
          import json
          import sys
          from pathlib import Path

          Path("/tmp/backend-templates-payload.json").write_text(json.dumps({
              "httpMethod": "GET",
              "path": "/api/templates",
              "headers": {
                  "x-portal-auth": "true",
                  "x-portal-secret": sys.argv[1],
              },
          }))
          PY
          aws lambda invoke \
            --function-name "$function_name" \
            --payload fileb:///tmp/backend-templates-payload.json \
            /tmp/backend-templates.json
          python3 - <<'PY'
          import json
          from pathlib import Path

          response = json.loads(Path("/tmp/backend-templates.json").read_text())
          assert response["statusCode"] == 200, response
          payload = json.loads(response["body"])
          templates = payload.get("templates") or []
          assert len(templates) >= 11, payload
          assert any(template.get("type") == "podcast" for template in templates), payload
          assert any(template.get("type") == "newsletter" for template in templates), payload
          PY

      - name: Smoke test backend health
        run: |
          function_name="$(aws cloudformation describe-stacks \
            --stack-name dataops-v1 \
            --query "Stacks[0].Outputs[?OutputKey=='BackendFunctionName'].OutputValue" \
            --output text)"
          printf '%s' '{"httpMethod":"GET","path":"/api/health"}' > /tmp/backend-health-payload.json
          aws lambda invoke \
            --function-name "$function_name" \
            --payload fileb:///tmp/backend-health-payload.json \
            /tmp/backend-health.json
          python3 - <<'PY'
          import json
          from pathlib import Path

          response = json.loads(Path("/tmp/backend-health.json").read_text())
          assert response["statusCode"] == 200, response
          assert json.loads(response["body"]) == {"status": "ok"}, response
          PY
