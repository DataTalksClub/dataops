name: Validate Planning Docs

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/validate-planning-docs.yml"
      - "_docs/**"
      - "docs/**"
      - "templates/**"
      - "content/tasks/templates/**"
      - ".goal-v1.md"
      - "PROJECT_PLAN.md"
      - "PORTAL_ANALYSIS.md"
      - "README.md"
      - "scripts/validate_planning_docs.py"
      - "tests/planning_docs/**"
      - "tests/docs_app/**"
      - "lambda-functions/src/lambda_functions/doc_registry.py"
      - "lambda-functions/src/lambda_functions/build_search_index.py"
      - "lambda-functions/src/lambda_functions/docs_index.py"
      - "lambda-functions/src/lambda_functions/sop_parse.py"
      - "Makefile"
  pull_request:
    paths:
      - ".github/workflows/validate-planning-docs.yml"
      - "_docs/**"
      - "docs/**"
      - "templates/**"
      - "content/tasks/templates/**"
      - ".goal-v1.md"
      - "PROJECT_PLAN.md"
      - "PORTAL_ANALYSIS.md"
      - "README.md"
      - "scripts/validate_planning_docs.py"
      - "tests/planning_docs/**"
      - "tests/docs_app/**"
      - "lambda-functions/src/lambda_functions/doc_registry.py"
      - "lambda-functions/src/lambda_functions/build_search_index.py"
      - "lambda-functions/src/lambda_functions/docs_index.py"
      - "lambda-functions/src/lambda_functions/sop_parse.py"
      - "Makefile"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-planning-docs:
    name: Validate planning and process docs
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Install Python
        run: uv python install

      - name: Run planning docs validation
        run: uv run --with pytest python -m pytest tests/planning_docs

      - name: Run docs metadata and registry tests
        run: uv run --project lambda-functions --extra search --with pytest python -m pytest tests/docs_app

      - name: Build content search index
        working-directory: lambda-functions
        run: uv run --extra search python -m lambda_functions.build_search_index --docs-dir ../content --output ../.tmp/dataops-content-search.index
