# Single-origin local portal: the consolidated TypeScript backend serves the
# static frontend, docs content API, and work APIs from one process on port
# 3000. For hot-reload dev use `make dev` instead; this compose is for running
# the compiled artifact in a container.
services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile.lambda
    working_dir: /app
    user: "${UID:-1000}:${GID:-1000}"
    environment:
      FRONTEND_ROOT: /app/frontend
      CONTENT_ROOT: /app/repo/content
      DATAOPS_DOCS_DOMAIN: "1"
      DTC_OFFLINE: "1"
      SKIP_AUTH: "true"
      PORT: "3000"
      HOME: /app/home
    volumes:
      - ./frontend:/app/frontend:ro
      - ./content:/app/repo/content:ro
    ports:
      - "3000:3000"
    command:
      - node
      - dist/scripts/dev-server.js
