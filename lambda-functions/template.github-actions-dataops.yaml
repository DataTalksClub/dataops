AWSTemplateFormatVersion: "2010-09-09"
Description: GitHub Actions OIDC deploy role for DataTalksClub/dataops

Parameters:
  GitHubOwner:
    Type: String
    Default: DataTalksClub
  GitHubRepo:
    Type: String
    Default: dataops
  GitHubBranch:
    Type: String
    Default: main
  DeployRoleName:
    Type: String
    Default: dataops-github-actions-deploy
  FullDocsStackName:
    Type: String
    Default: dataops-v1
  FullDocsRegion:
    Type: String
    Default: eu-west-1
  SamArtifactBucketName:
    Type: String
    Default: aws-sam-cli-managed-default-samclisourcebucket-dgwncwijmnpd

Resources:
  GitHubActionsDeployRole:
    Type: AWS::IAM::Role
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      RoleName: !Ref DeployRoleName
      MaxSessionDuration: 3600
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Federated: !Sub arn:${AWS::Partition}:iam::${AWS::AccountId}:oidc-provider/token.actions.githubusercontent.com
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                token.actions.githubusercontent.com:aud: sts.amazonaws.com
                token.actions.githubusercontent.com:sub: !Sub repo:${GitHubOwner}/${GitHubRepo}:ref:refs/heads/${GitHubBranch}
      Policies:
        - PolicyName: dataops-v1-deploy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: CloudFormationDataOpsStack
                Effect: Allow
                Action:
                  - cloudformation:CreateChangeSet
                  - cloudformation:CreateStack
                  - cloudformation:DeleteChangeSet
                  - cloudformation:DescribeChangeSet
                  - cloudformation:DescribeStackEvents
                  - cloudformation:DescribeStackResource
                  - cloudformation:DescribeStackResources
                  - cloudformation:DescribeStacks
                  - cloudformation:ExecuteChangeSet
                  - cloudformation:GetTemplateSummary
                  - cloudformation:ListStackResources
                  - cloudformation:UpdateStack
                  - cloudformation:ValidateTemplate
                Resource:
                  - !Sub arn:${AWS::Partition}:cloudformation:${FullDocsRegion}:${AWS::AccountId}:stack/${FullDocsStackName}/*
                  - !Sub arn:${AWS::Partition}:cloudformation:${FullDocsRegion}:aws:transform/Serverless-2016-10-31
              - Sid: CloudFormationRead
                Effect: Allow
                Action:
                  - cloudformation:DescribeStacks
                  - cloudformation:ListStacks
                  - cloudformation:ValidateTemplate
                Resource: "*"
              - Sid: SamArtifacts
                Effect: Allow
                Action:
                  - s3:CreateBucket
                  - s3:DeleteObject
                  - s3:GetBucketLocation
                  - s3:GetObject
                  - s3:ListBucket
                  - s3:PutObject
                Resource:
                  - !Sub arn:${AWS::Partition}:s3:::${SamArtifactBucketName}
                  - !Sub arn:${AWS::Partition}:s3:::${SamArtifactBucketName}/*
                  - !Sub arn:${AWS::Partition}:s3:::aws-sam-cli-managed-default-*
                  - !Sub arn:${AWS::Partition}:s3:::aws-sam-cli-managed-default-*/*
              - Sid: LambdaDataOpsFunction
                Effect: Allow
                Action:
                  - lambda:AddPermission
                  - lambda:CreateFunction
                  - lambda:CreateFunctionUrlConfig
                  - lambda:DeleteFunction
                  - lambda:DeleteFunctionUrlConfig
                  - lambda:GetFunction
                  - lambda:GetFunctionConfiguration
                  - lambda:GetFunctionUrlConfig
                  - lambda:InvokeFunction
                  - lambda:ListTags
                  - lambda:RemovePermission
                  - lambda:TagResource
                  - lambda:UntagResource
                  - lambda:UpdateFunctionCode
                  - lambda:UpdateFunctionConfiguration
                  - lambda:UpdateFunctionUrlConfig
                Resource:
                  - !Sub arn:${AWS::Partition}:lambda:${FullDocsRegion}:${AWS::AccountId}:function:${FullDocsStackName}-DocsFullAppFunction-*
                  - !Sub arn:${AWS::Partition}:lambda:${FullDocsRegion}:${AWS::AccountId}:function:${FullDocsStackName}-DocsFullAppFunction-*:*
                  - !Sub arn:${AWS::Partition}:lambda:${FullDocsRegion}:${AWS::AccountId}:function:${FullDocsStackName}-WorkEngineFunction-*
                  - !Sub arn:${AWS::Partition}:lambda:${FullDocsRegion}:${AWS::AccountId}:function:${FullDocsStackName}-WorkEngineFunction-*:*
              - Sid: DynamoDbDataOpsExecutionTables
                Effect: Allow
                Action:
                  - dynamodb:CreateTable
                  - dynamodb:DeleteTable
                  - dynamodb:DescribeContinuousBackups
                  - dynamodb:DescribeTable
                  - dynamodb:ListTagsOfResource
                  - dynamodb:TagResource
                  - dynamodb:UntagResource
                  - dynamodb:UpdateContinuousBackups
                  - dynamodb:UpdateTable
                  - dynamodb:UpdateTimeToLive
                Resource:
                  - !Sub arn:${AWS::Partition}:dynamodb:${FullDocsRegion}:${AWS::AccountId}:table/${FullDocsStackName}-*
                  - !Sub arn:${AWS::Partition}:dynamodb:${FullDocsRegion}:${AWS::AccountId}:table/${FullDocsStackName}-*/index/*
              - Sid: IamDataOpsFunctionRole
                Effect: Allow
                Action:
                  - iam:CreateRole
                  - iam:DeleteRole
                  - iam:DeleteRolePolicy
                  - iam:AttachRolePolicy
                  - iam:DetachRolePolicy
                  - iam:GetRole
                  - iam:GetRolePolicy
                  - iam:ListAttachedRolePolicies
                  - iam:ListRoleTags
                  - iam:PassRole
                  - iam:PutRolePolicy
                  - iam:TagRole
                  - iam:UntagRole
                  - iam:UpdateAssumeRolePolicy
                Resource:
                  - !Sub arn:${AWS::Partition}:iam::${AWS::AccountId}:role/${FullDocsStackName}-DocsFullAppFunctionRole-*
                  - !Sub arn:${AWS::Partition}:iam::${AWS::AccountId}:role/${FullDocsStackName}-WorkEngineFunctionRole-*
              - Sid: LogsDataOpsFunction
                Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:DeleteLogGroup
                  - logs:DescribeLogGroups
                  - logs:PutRetentionPolicy
                  - logs:TagResource
                  - logs:UntagResource
                Resource:
                  - !Sub arn:${AWS::Partition}:logs:${FullDocsRegion}:${AWS::AccountId}:log-group:/aws/lambda/${FullDocsStackName}-DocsFullAppFunction-*
                  - !Sub arn:${AWS::Partition}:logs:${FullDocsRegion}:${AWS::AccountId}:log-group:/aws/lambda/${FullDocsStackName}-DocsFullAppFunction-*:*
                  - !Sub arn:${AWS::Partition}:logs:${FullDocsRegion}:${AWS::AccountId}:log-group:/aws/lambda/${FullDocsStackName}-WorkEngineFunction-*
                  - !Sub arn:${AWS::Partition}:logs:${FullDocsRegion}:${AWS::AccountId}:log-group:/aws/lambda/${FullDocsStackName}-WorkEngineFunction-*:*
              - Sid: SecretsManagerDataOpsPortalSecret
                Effect: Allow
                Action:
                  - secretsmanager:CreateSecret
                  - secretsmanager:DeleteSecret
                  - secretsmanager:DescribeSecret
                  - secretsmanager:GetSecretValue
                  - secretsmanager:ListSecretVersionIds
                  - secretsmanager:PutSecretValue
                  - secretsmanager:TagResource
                  - secretsmanager:UntagResource
                  - secretsmanager:UpdateSecret
                Resource:
                  - !Sub arn:${AWS::Partition}:secretsmanager:${FullDocsRegion}:${AWS::AccountId}:secret:${FullDocsStackName}/work-engine/portal-secret-*
              - Sid: SecretsManagerGeneratePortalSecret
                Effect: Allow
                Action:
                  - secretsmanager:GetRandomPassword
                Resource: "*"

Outputs:
  GitHubActionsDeployRoleArn:
    Description: Role ARN for aws-actions/configure-aws-credentials
    Value: !GetAtt GitHubActionsDeployRole.Arn
