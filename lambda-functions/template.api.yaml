AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: DataTalksClub operations docs API Lambda

Parameters:
  GitHubOwner:
    Type: String
  GitHubRepo:
    Type: String
  GitHubBranch:
    Type: String
    Default: main
  GitHubTokenSecretArn:
    Type: String
  AllowedEmailDomain:
    Type: String

Globals:
  Function:
    Runtime: python3.14
    Timeout: 20
    MemorySize: 512
    Architectures:
      - x86_64
    Environment:
      Variables:
        GITHUB_OWNER: !Ref GitHubOwner
        GITHUB_REPO: !Ref GitHubRepo
        GITHUB_BRANCH: !Ref GitHubBranch
        GITHUB_TOKEN_SECRET_ARN: !Ref GitHubTokenSecretArn
        ALLOWED_EMAIL_DOMAIN: !Ref AllowedEmailDomain

Resources:
  DocsApiFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: makefile
    Properties:
      CodeUri: .
      Handler: lambda_functions.api_handler.handler
      Policies:
        - Statement:
            Effect: Allow
            Action:
              - secretsmanager:GetSecretValue
            Resource: !Ref GitHubTokenSecretArn
      FunctionUrlConfig:
        AuthType: NONE
        Cors:
          AllowCredentials: false
          AllowHeaders:
            - content-type
            - x-user-email
          AllowMethods:
            - GET
            - POST
            - PUT
            - DELETE
            - OPTIONS
          AllowOrigins:
            - "*"

Outputs:
  DocsApiUrl:
    Description: API Lambda Function URL
    Value: !GetAtt DocsApiFunctionUrl.FunctionUrl
