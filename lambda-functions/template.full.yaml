AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: DataTalksClub DataOps v1 protected Lambda app

Parameters:
  GitHubOwner:
    Type: String
    Default: DataTalksClub
  GitHubRepo:
    Type: String
    Default: dataops
  GitHubBranch:
    Type: String
    Default: main
  GitHubTokenSecretName:
    Type: String
    Default: dtc-operations/full-app/github-token
  BasicAuthUsername:
    Type: String
    Default: admin
  BasicAuthPasswordSecretName:
    Type: String
    Default: dtc-operations/full-app/basic-auth-password

Globals:
  Function:
    Runtime: python3.14
    Timeout: 60
    MemorySize: 1024
    Architectures:
      - x86_64

Resources:
  DataOpsTasksTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Sub ${AWS::StackName}-tasks
      BillingMode: PAY_PER_REQUEST
      SSESpecification:
        SSEEnabled: true
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
        - AttributeName: date
          AttributeType: S
        - AttributeName: status
          AttributeType: S
        - AttributeName: bundleId
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: GSI-Date
          KeySchema:
            - AttributeName: date
              KeyType: HASH
            - AttributeName: status
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: GSI-Bundle
          KeySchema:
            - AttributeName: bundleId
              KeyType: HASH
            - AttributeName: date
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: GSI-Status
          KeySchema:
            - AttributeName: status
              KeyType: HASH
            - AttributeName: date
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      Tags:
        - Key: Project
          Value: DataOps
        - Key: App
          Value: DataOpsV1
        - Key: DataClass
          Value: ExecutionState

  DataOpsBundlesTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Sub ${AWS::StackName}-bundles
      BillingMode: PAY_PER_REQUEST
      SSESpecification:
        SSEEnabled: true
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      Tags:
        - Key: Project
          Value: DataOps
        - Key: App
          Value: DataOpsV1
        - Key: DataClass
          Value: ExecutionState

  DataOpsTemplatesTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Sub ${AWS::StackName}-templates
      BillingMode: PAY_PER_REQUEST
      SSESpecification:
        SSEEnabled: true
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      Tags:
        - Key: Project
          Value: DataOps
        - Key: App
          Value: DataOpsV1
        - Key: DataClass
          Value: ExecutionState

  DataOpsUsersTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Sub ${AWS::StackName}-users
      BillingMode: PAY_PER_REQUEST
      SSESpecification:
        SSEEnabled: true
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      Tags:
        - Key: Project
          Value: DataOps
        - Key: App
          Value: DataOpsV1
        - Key: DataClass
          Value: ExecutionState

  DataOpsFilesTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Sub ${AWS::StackName}-files
      BillingMode: PAY_PER_REQUEST
      SSESpecification:
        SSEEnabled: true
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
        - AttributeName: taskId
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: GSI-Task
          KeySchema:
            - AttributeName: taskId
              KeyType: HASH
            - AttributeName: SK
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      Tags:
        - Key: Project
          Value: DataOps
        - Key: App
          Value: DataOpsV1
        - Key: DataClass
          Value: ExecutionState

  DataOpsNotificationsTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Sub ${AWS::StackName}-notifications
      BillingMode: PAY_PER_REQUEST
      SSESpecification:
        SSEEnabled: true
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      Tags:
        - Key: Project
          Value: DataOps
        - Key: App
          Value: DataOpsV1
        - Key: DataClass
          Value: ExecutionState

  DataOpsSessionsTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Sub ${AWS::StackName}-sessions
      BillingMode: PAY_PER_REQUEST
      SSESpecification:
        SSEEnabled: true
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      Tags:
        - Key: Project
          Value: DataOps
        - Key: App
          Value: DataOpsV1
        - Key: DataClass
          Value: SessionState

  DocsFullAppFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: makefile
    Properties:
      CodeUri: .
      Handler: lambda_functions.full_app_handler.handler
      Policies:
        - Statement:
            Effect: Allow
            Action:
              - secretsmanager:GetSecretValue
            Resource:
              - !Sub arn:${AWS::Partition}:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${GitHubTokenSecretName}-*
              - !Sub arn:${AWS::Partition}:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${BasicAuthPasswordSecretName}-*
      Environment:
        Variables:
          GITHUB_OWNER: !Ref GitHubOwner
          GITHUB_REPO: !Ref GitHubRepo
          GITHUB_BRANCH: !Ref GitHubBranch
          GITHUB_TOKEN_SECRET_NAME: !Ref GitHubTokenSecretName
          BASIC_AUTH_USERNAME: !Ref BasicAuthUsername
          BASIC_AUTH_PASSWORD_SECRET_NAME: !Ref BasicAuthPasswordSecretName
      FunctionUrlConfig:
        AuthType: NONE
        Cors:
          AllowCredentials: false
          AllowHeaders:
            - authorization
            - content-type
            - x-user-email
          AllowMethods:
            - GET
            - POST
            - PUT
            - DELETE
          AllowOrigins:
            - "*"

Outputs:
  DocsFullAppUrl:
    Description: Protected DataOps v1 Lambda Function URL
    Value: !GetAtt DocsFullAppFunctionUrl.FunctionUrl
  DataOpsTasksTableName:
    Description: DynamoDB table for task and recurring execution state
    Value: !Ref DataOpsTasksTable
  DataOpsBundlesTableName:
    Description: DynamoDB table for workflow bundles
    Value: !Ref DataOpsBundlesTable
  DataOpsTemplatesTableName:
    Description: DynamoDB table for runtime template projections
    Value: !Ref DataOpsTemplatesTable
  DataOpsUsersTableName:
    Description: DynamoDB table for operator identities
    Value: !Ref DataOpsUsersTable
  DataOpsFilesTableName:
    Description: DynamoDB table for file metadata
    Value: !Ref DataOpsFilesTable
  DataOpsNotificationsTableName:
    Description: DynamoDB table for reminders and notifications
    Value: !Ref DataOpsNotificationsTable
  DataOpsSessionsTableName:
    Description: DynamoDB table for session state
    Value: !Ref DataOpsSessionsTable
