AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: DataTalksClub DataOps v1 protected Lambda app

Parameters:
  GitHubOwner:
    Type: String
    Default: DataTalksClub
  GitHubRepo:
    Type: String
    Default: dataops
  GitHubBranch:
    Type: String
    Default: main
  GitHubTokenSecretName:
    Type: String
    Default: dataops-v1/full-app/github-token
  BasicAuthUsername:
    Type: String
    Default: admin
  BasicAuthPasswordSecretName:
    Type: String
    Default: dataops-v1/full-app/basic-auth-password

Globals:
  Function:
    Runtime: python3.14
    Timeout: 60
    MemorySize: 1024
    Architectures:
      - x86_64

Resources:
  DataOpsTasksTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Sub ${AWS::StackName}-tasks
      BillingMode: PAY_PER_REQUEST
      SSESpecification:
        SSEEnabled: true
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
        - AttributeName: date
          AttributeType: S
        - AttributeName: status
          AttributeType: S
        - AttributeName: bundleId
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: GSI-Date
          KeySchema:
            - AttributeName: date
              KeyType: HASH
            - AttributeName: status
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: GSI-Bundle
          KeySchema:
            - AttributeName: bundleId
              KeyType: HASH
            - AttributeName: date
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: GSI-Status
          KeySchema:
            - AttributeName: status
              KeyType: HASH
            - AttributeName: date
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      Tags:
        - Key: Project
          Value: DataOps
        - Key: App
          Value: DataOpsV1
        - Key: DataClass
          Value: ExecutionState

  DataOpsBundlesTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Sub ${AWS::StackName}-bundles
      BillingMode: PAY_PER_REQUEST
      SSESpecification:
        SSEEnabled: true
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      Tags:
        - Key: Project
          Value: DataOps
        - Key: App
          Value: DataOpsV1
        - Key: DataClass
          Value: ExecutionState

  DataOpsTemplatesTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Sub ${AWS::StackName}-templates
      BillingMode: PAY_PER_REQUEST
      SSESpecification:
        SSEEnabled: true
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      Tags:
        - Key: Project
          Value: DataOps
        - Key: App
          Value: DataOpsV1
        - Key: DataClass
          Value: ExecutionState

  DataOpsUsersTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Sub ${AWS::StackName}-users
      BillingMode: PAY_PER_REQUEST
      SSESpecification:
        SSEEnabled: true
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      Tags:
        - Key: Project
          Value: DataOps
        - Key: App
          Value: DataOpsV1
        - Key: DataClass
          Value: ExecutionState

  DataOpsFilesTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Sub ${AWS::StackName}-files
      BillingMode: PAY_PER_REQUEST
      SSESpecification:
        SSEEnabled: true
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
        - AttributeName: taskId
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: GSI-Task
          KeySchema:
            - AttributeName: taskId
              KeyType: HASH
            - AttributeName: SK
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      Tags:
        - Key: Project
          Value: DataOps
        - Key: App
          Value: DataOpsV1
        - Key: DataClass
          Value: ExecutionState

  DataOpsArtifactsTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Sub ${AWS::StackName}-artifacts
      BillingMode: PAY_PER_REQUEST
      SSESpecification:
        SSEEnabled: true
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      Tags:
        - Key: Project
          Value: DataOps
        - Key: App
          Value: DataOpsV1
        - Key: DataClass
          Value: ExecutionState

  DataOpsAssistantJobsTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Sub ${AWS::StackName}-assistant-jobs
      BillingMode: PAY_PER_REQUEST
      SSESpecification:
        SSEEnabled: true
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      Tags:
        - Key: Project
          Value: DataOps
        - Key: App
          Value: DataOpsV1
        - Key: DataClass
          Value: ExecutionState

  DataOpsAuditEventsTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Sub ${AWS::StackName}-audit-events
      BillingMode: PAY_PER_REQUEST
      SSESpecification:
        SSEEnabled: true
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      Tags:
        - Key: Project
          Value: DataOps
        - Key: App
          Value: DataOpsV1
        - Key: DataClass
          Value: ExecutionState

  DataOpsNotificationsTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Sub ${AWS::StackName}-notifications
      BillingMode: PAY_PER_REQUEST
      SSESpecification:
        SSEEnabled: true
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      Tags:
        - Key: Project
          Value: DataOps
        - Key: App
          Value: DataOpsV1
        - Key: DataClass
          Value: ExecutionState

  DataOpsSessionsTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Sub ${AWS::StackName}-sessions
      BillingMode: PAY_PER_REQUEST
      SSESpecification:
        SSEEnabled: true
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      Tags:
        - Key: Project
          Value: DataOps
        - Key: App
          Value: DataOpsV1
        - Key: DataClass
          Value: SessionState

  WorkEnginePortalSecret:
    Type: AWS::SecretsManager::Secret
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      Name: !Sub ${AWS::StackName}/work-engine/portal-secret
      GenerateSecretString:
        PasswordLength: 48
        ExcludePunctuation: true
      Tags:
        - Key: Project
          Value: DataOps
        - Key: App
          Value: DataOpsV1
        - Key: DataClass
          Value: PortalBrokerSecret

  DocsFullAppFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: makefile
    Properties:
      CodeUri: .
      Handler: lambda_functions.full_app_handler.handler
      Policies:
        - Statement:
            Effect: Allow
            Action:
              - secretsmanager:GetSecretValue
            Resource:
              - !Sub arn:${AWS::Partition}:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${GitHubTokenSecretName}-*
              - !Sub arn:${AWS::Partition}:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${BasicAuthPasswordSecretName}-*
              - !Ref WorkEnginePortalSecret
        - Statement:
            Effect: Allow
            Action:
              - lambda:InvokeFunction
            Resource:
              - !GetAtt WorkEngineFunction.Arn
      Environment:
        Variables:
          GITHUB_OWNER: !Ref GitHubOwner
          GITHUB_REPO: !Ref GitHubRepo
          GITHUB_BRANCH: !Ref GitHubBranch
          GITHUB_TOKEN_SECRET_NAME: !Ref GitHubTokenSecretName
          BASIC_AUTH_USERNAME: !Ref BasicAuthUsername
          BASIC_AUTH_PASSWORD_SECRET_NAME: !Ref BasicAuthPasswordSecretName
          WORK_ENGINE_FUNCTION_NAME: !Ref WorkEngineFunction
          WORK_ENGINE_PORTAL_SECRET_NAME: !Ref WorkEnginePortalSecret
      FunctionUrlConfig:
        AuthType: NONE
        Cors:
          AllowCredentials: false
          AllowHeaders:
            - authorization
            - content-type
            - x-user-email
          AllowMethods:
            - GET
            - POST
            - PUT
            - DELETE
          AllowOrigins:
            - "*"

  WorkEngineFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: makefile
    Properties:
      CodeUri: ..
      Runtime: nodejs20.x
      Handler: dist/handler.handler
      Timeout: 30
      MemorySize: 1024
      Policies:
        - Statement:
            Effect: Allow
            Action:
              - dynamodb:DeleteItem
              - dynamodb:GetItem
              - dynamodb:PutItem
              - dynamodb:Query
              - dynamodb:Scan
              - dynamodb:UpdateItem
            Resource:
              - !GetAtt DataOpsTasksTable.Arn
              - !Sub ${DataOpsTasksTable.Arn}/index/*
              - !GetAtt DataOpsBundlesTable.Arn
              - !GetAtt DataOpsTemplatesTable.Arn
              - !GetAtt DataOpsUsersTable.Arn
              - !GetAtt DataOpsFilesTable.Arn
              - !Sub ${DataOpsFilesTable.Arn}/index/*
              - !GetAtt DataOpsArtifactsTable.Arn
              - !GetAtt DataOpsAssistantJobsTable.Arn
              - !GetAtt DataOpsAuditEventsTable.Arn
              - !GetAtt DataOpsNotificationsTable.Arn
              - !GetAtt DataOpsSessionsTable.Arn
        - Statement:
            Effect: Allow
            Action:
              - secretsmanager:GetSecretValue
            Resource:
              - !Ref WorkEnginePortalSecret
      Environment:
        Variables:
          DATAOPS_TASKS_TABLE: !Ref DataOpsTasksTable
          DATAOPS_BUNDLES_TABLE: !Ref DataOpsBundlesTable
          DATAOPS_TEMPLATES_TABLE: !Ref DataOpsTemplatesTable
          DATAOPS_USERS_TABLE: !Ref DataOpsUsersTable
          DATAOPS_FILES_TABLE: !Ref DataOpsFilesTable
          DATAOPS_ARTIFACTS_TABLE: !Ref DataOpsArtifactsTable
          DATAOPS_ASSISTANT_JOBS_TABLE: !Ref DataOpsAssistantJobsTable
          DATAOPS_AUDIT_EVENTS_TABLE: !Ref DataOpsAuditEventsTable
          DATAOPS_NOTIFICATIONS_TABLE: !Ref DataOpsNotificationsTable
          DATAOPS_SESSIONS_TABLE: !Ref DataOpsSessionsTable
          WORK_ENGINE_AUTH_MODE: portal
          WORK_ENGINE_PORTAL_SECRET_NAME: !Ref WorkEnginePortalSecret
      Events:
        DailyWorkEngineCron:
          Type: Schedule
          Properties:
            Description: Run DataOps recurring task and automatic template generation once per day.
            Schedule: cron(0 8 * * ? *)
            Enabled: true

Outputs:
  DocsFullAppUrl:
    Description: Protected DataOps v1 Lambda Function URL
    Value: !GetAtt DocsFullAppFunctionUrl.FunctionUrl
  DataOpsTasksTableName:
    Description: DynamoDB table for task and recurring execution state
    Value: !Ref DataOpsTasksTable
  DataOpsBundlesTableName:
    Description: DynamoDB table for workflow bundles
    Value: !Ref DataOpsBundlesTable
  DataOpsTemplatesTableName:
    Description: DynamoDB table for runtime template projections
    Value: !Ref DataOpsTemplatesTable
  DataOpsUsersTableName:
    Description: DynamoDB table for operator identities
    Value: !Ref DataOpsUsersTable
  DataOpsFilesTableName:
    Description: DynamoDB table for file metadata
    Value: !Ref DataOpsFilesTable
  DataOpsArtifactsTableName:
    Description: DynamoDB table for artifact metadata
    Value: !Ref DataOpsArtifactsTable
  DataOpsAssistantJobsTableName:
    Description: DynamoDB table for assistant job metadata
    Value: !Ref DataOpsAssistantJobsTable
  DataOpsAuditEventsTableName:
    Description: DynamoDB table for assistant job and workflow audit events
    Value: !Ref DataOpsAuditEventsTable
  DataOpsNotificationsTableName:
    Description: DynamoDB table for reminders and notifications
    Value: !Ref DataOpsNotificationsTable
  DataOpsSessionsTableName:
    Description: DynamoDB table for session state
    Value: !Ref DataOpsSessionsTable
  WorkEngineFunctionName:
    Description: Private DataOps work-engine Lambda function
    Value: !Ref WorkEngineFunction
  WorkEnginePortalSecretName:
    Description: Secret shared by the portal broker and private work engine
    Value: !Ref WorkEnginePortalSecret
