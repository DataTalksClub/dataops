AWSTemplateFormatVersion: "2010-09-09"
Description: Runtime secrets for the protected DataOps docs app

Parameters:
  GitHubTokenSecretName:
    Type: String
    Default: dataops-v1/full-app/github-token
  GitHubToken:
    Type: String
    NoEcho: true
  BasicAuthPasswordSecretName:
    Type: String
    Default: dataops-v1/full-app/basic-auth-password
  BasicAuthPassword:
    Type: String
    NoEcho: true

Resources:
  FullAppGitHubTokenSecret:
    Type: AWS::SecretsManager::Secret
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      Name: !Ref GitHubTokenSecretName
      Description: GitHub API token used by the protected docs Lambda at runtime
      SecretString: !Ref GitHubToken

  FullAppBasicAuthPasswordSecret:
    Type: AWS::SecretsManager::Secret
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      Name: !Ref BasicAuthPasswordSecretName
      Description: Basic-auth password used by the protected docs Lambda
      SecretString: !Ref BasicAuthPassword

Outputs:
  FullAppGitHubTokenSecretArn:
    Description: Secret ARN for the full docs Lambda GitHub token
    Value: !Ref FullAppGitHubTokenSecret
  FullAppGitHubTokenSecretName:
    Description: Secret name consumed by the full docs Lambda
    Value: !Ref GitHubTokenSecretName
  FullAppBasicAuthPasswordSecretArn:
    Description: Secret ARN for the full docs Lambda basic-auth password
    Value: !Ref FullAppBasicAuthPasswordSecret
  FullAppBasicAuthPasswordSecretName:
    Description: Basic-auth password secret name consumed by the full docs Lambda
    Value: !Ref BasicAuthPasswordSecretName
