AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: DataTalksClub DataOps v1 protected Lambda app

Parameters:
  GitHubOwner:
    Type: String
    Default: DataTalksClub
  GitHubRepo:
    Type: String
    Default: dataops
  GitHubBranch:
    Type: String
    Default: main
  GitHubTokenSecretName:
    Type: String
    Default: dataops-v1/full-app/github-token
  AuthBaseUrl:
    Type: String
    Default: https://auth.dtcdev.click
  AuthUserPoolId:
    Type: String
    Default: us-east-1_H7nJu52Bs
  AuthIssuer:
    Type: String
    Default: https://cognito-idp.us-east-1.amazonaws.com/us-east-1_H7nJu52Bs
  AuthJwksUrl:
    Type: String
    Default: https://cognito-idp.us-east-1.amazonaws.com/us-east-1_H7nJu52Bs/.well-known/jwks.json
  AuthClientId:
    Type: String
    Default: 1kjv61esdjs3003s8u42sgr3hf
  AuthCallbackUrl:
    Type: String
    Default: https://ops.dtcdev.click/auth/callback
  AuthLogoutUrl:
    Type: String
    Default: https://ops.dtcdev.click/
  AuthSessionLifetimeSeconds:
    Type: Number
    Default: 28800
    MinValue: 300
    MaxValue: 86400
  DataOpsEnvironment:
    Type: String
    Default: prod
    AllowedPattern: "^[a-zA-Z0-9_.-]+$"
  ExportArchivePrefix:
    Type: String
    Default: execution-exports
    AllowedPattern: "^[a-zA-Z0-9_.\\/-]+$"
  ExportArchiveRetentionDays:
    Type: Number
    Default: 365
    MinValue: 90
  TypefullyApiTokenSecretName:
    Type: String
    Default: dataops-v1/work-engine/typefully-api-token
  TypefullyApiToken:
    Type: String
    NoEcho: true
    Default: ""
  TypefullySocialSetAlexey:
    Type: Number
    Default: 0
  TypefullySocialSetDataTalksClub:
    Type: Number
    Default: 0
  EmailDocumentIntakeSecretArn:
    Type: String
    Description: ARN of the pre-created email document intake secret
    AllowedPattern: "^arn:[a-z0-9-]+:secretsmanager:[a-z0-9-]+:[0-9]{12}:secret:.+$"
  EmailDocumentSourcePrefix:
    Type: String
    Default: transfer/
    AllowedPattern: "^[a-zA-Z0-9_.\/-]+/$"
  EmailDocumentExternalSourceBucketName:
    Type: String
    Default: ""
    AllowedPattern: "^$|^[a-z0-9][a-z0-9.-]{1,61}[a-z0-9]$"
    Description: Optional explicit same/cross-account private transfer source bucket
  EmailDocumentExternalSourcePrefix:
    Type: String
    Default: transfer/
    AllowedPattern: "^[a-zA-Z0-9_.\/-]+/$"
  EmailDocumentExternalSourceKmsKeyArn:
    Type: String
    Default: ""
    AllowedPattern: "^$|^arn:[a-z0-9-]+:kms:[a-z0-9-]+:[0-9]{12}:key/[a-zA-Z0-9-]+$"
    Description: Optional customer-managed KMS key ARN for the explicit source
  EmailDocumentDestinationPrefix:
    Type: String
    Default: artifacts/
    AllowedPattern: "^[a-zA-Z0-9_.\/-]+/$"
  EmailDocumentRecipientRoutes:
    Type: String
    Default: invoice,receipts,invoice-attachment,invoice-pdf,todo
    AllowedPattern: "^[a-z0-9_-]+(,[a-z0-9_-]+)*$"
  EmailDocumentRateLimit:
    Type: Number
    Default: 60
    MinValue: 1
    MaxValue: 10000
  MailingExportsConfig:
    Type: String
    Default: '[]'
  DapierCredentialsTableName:
    Type: String
    Description: Physical name of the Dapier-owned credentials table.
  DapierCredentialsTableArn:
    Type: String
    Description: ARN of the Dapier-owned credentials table for least-privilege GetItem access.
  NewsletterOpenAlertLeadDays:
    Type: Number
    Default: 14
    MinValue: 0
    MaxValue: 365
  NewsletterWorkflowAlertLeadDays:
    Type: Number
    Default: 10
    MinValue: 0
    MaxValue: 365
  WorkEngineTypefullyApiTokenSecretArn:
    Type: String
    Description: ARN of the pre-created Typefully API token secret (created out-of-band via aws cli)
Conditions:
  HasEmailDocumentExternalSource: !Not [!Equals [!Ref EmailDocumentExternalSourceBucketName, ""]]
  HasEmailDocumentExternalSourceKms: !Not [!Equals [!Ref EmailDocumentExternalSourceKmsKeyArn, ""]]
Globals:
  Function:
    Runtime: nodejs24.x
    Timeout: 60
    MemorySize: 1024
    Architectures:
      - x86_64

Resources:
  DataOpsCalendarTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Sub ${AWS::StackName}-calendar
      BillingMode: PAY_PER_REQUEST
      SSESpecification: { SSEEnabled: true }
      PointInTimeRecoverySpecification: { PointInTimeRecoveryEnabled: true }
      AttributeDefinitions:
        - { AttributeName: PK, AttributeType: S }
        - { AttributeName: SK, AttributeType: S }
        - { AttributeName: rangeMonth, AttributeType: S }
        - { AttributeName: rangeStart, AttributeType: S }
      KeySchema:
        - { AttributeName: PK, KeyType: HASH }
        - { AttributeName: SK, KeyType: RANGE }
      GlobalSecondaryIndexes:
        - IndexName: GSI-Range
          KeySchema:
            - { AttributeName: rangeMonth, KeyType: HASH }
            - { AttributeName: rangeStart, KeyType: RANGE }
          Projection: { ProjectionType: ALL }
  DataOpsNewsletterSlotsTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Sub ${AWS::StackName}-newsletter-slots
      BillingMode: PAY_PER_REQUEST
      SSESpecification: { SSEEnabled: true }
      PointInTimeRecoverySpecification: { PointInTimeRecoveryEnabled: true }
      AttributeDefinitions:
        - { AttributeName: PK, AttributeType: S }
        - { AttributeName: SK, AttributeType: S }
        - { AttributeName: rangeKey, AttributeType: S }
        - { AttributeName: publicationKey, AttributeType: S }
      KeySchema:
        - { AttributeName: PK, KeyType: HASH }
        - { AttributeName: SK, KeyType: RANGE }
      GlobalSecondaryIndexes:
        - IndexName: GSI-Date
          KeySchema:
            - { AttributeName: rangeKey, KeyType: HASH }
            - { AttributeName: publicationKey, KeyType: RANGE }
          Projection: { ProjectionType: ALL }
  DataOpsSponsorCrmTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Sub ${AWS::StackName}-sponsor-crm
      BillingMode: PAY_PER_REQUEST
      SSESpecification: { SSEEnabled: true }
      PointInTimeRecoverySpecification: { PointInTimeRecoveryEnabled: true }
      AttributeDefinitions:
        - { AttributeName: PK, AttributeType: S }
        - { AttributeName: SK, AttributeType: S }
      KeySchema:
        - { AttributeName: PK, KeyType: HASH }
        - { AttributeName: SK, KeyType: RANGE }

  DataOpsBookkeepingTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Sub ${AWS::StackName}-bookkeeping
      BillingMode: PAY_PER_REQUEST
      SSESpecification: { SSEEnabled: true }
      PointInTimeRecoverySpecification: { PointInTimeRecoveryEnabled: true }
      AttributeDefinitions:
        - { AttributeName: PK, AttributeType: S }
        - { AttributeName: SK, AttributeType: S }
      KeySchema:
        - { AttributeName: PK, KeyType: HASH }
        - { AttributeName: SK, KeyType: RANGE }

  BookkeepingDocumentsKey:
    Type: AWS::KMS::Key
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      EnableKeyRotation: true
      KeyPolicy:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal: { AWS: !Sub "arn:${AWS::Partition}:iam::${AWS::AccountId}:root" }
            Action: "kms:*"
            Resource: "*"

  BookkeepingDocumentsBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault: { SSEAlgorithm: aws:kms, KMSMasterKeyID: !GetAtt BookkeepingDocumentsKey.Arn }
            BucketKeyEnabled: true
      OwnershipControls: { Rules: [{ ObjectOwnership: BucketOwnerEnforced }] }
      PublicAccessBlockConfiguration: { BlockPublicAcls: true, IgnorePublicAcls: true, BlockPublicPolicy: true, RestrictPublicBuckets: true }
      VersioningConfiguration: { Status: Enabled }
      LifecycleConfiguration:
        Rules:
          - Id: CleanupIncompleteUploads
            Status: Enabled
            AbortIncompleteMultipartUpload: { DaysAfterInitiation: 1 }
          - Id: RetainNoncurrentEvidence
            Status: Enabled
            NoncurrentVersionTransitions: [{ StorageClass: GLACIER, TransitionInDays: 90 }]

  BookkeepingDocumentsBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref BookkeepingDocumentsBucket
      PolicyDocument:
        Statement:
          - Effect: Deny
            Principal: "*"
            Action: "s3:*"
            Resource: [!GetAtt BookkeepingDocumentsBucket.Arn, !Sub "${BookkeepingDocumentsBucket.Arn}/*"]
            Condition: { Bool: { "aws:SecureTransport": false } }

  EmailDocumentsKey:
    Type: AWS::KMS::Key
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      EnableKeyRotation: true
      KeyPolicy:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal: { AWS: !Sub "arn:${AWS::Partition}:iam::${AWS::AccountId}:root" }
            Action: "kms:*"
            Resource: "*"

  EmailDocumentsBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault: { SSEAlgorithm: aws:kms, KMSMasterKeyID: !GetAtt EmailDocumentsKey.Arn }
            BucketKeyEnabled: true
      OwnershipControls: { Rules: [{ ObjectOwnership: BucketOwnerEnforced }] }
      PublicAccessBlockConfiguration: { BlockPublicAcls: true, IgnorePublicAcls: true, BlockPublicPolicy: true, RestrictPublicBuckets: true }
      VersioningConfiguration: { Status: Enabled }
      LifecycleConfiguration:
        Rules:
          - Id: CleanupIncompleteUploads
            Status: Enabled
            AbortIncompleteMultipartUpload: { DaysAfterInitiation: 1 }
          - Id: RetainNoncurrentDocuments
            Status: Enabled
            NoncurrentVersionTransitions: [{ StorageClass: GLACIER, TransitionInDays: 90 }]

  EmailDocumentsBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref EmailDocumentsBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Deny
            Principal: "*"
            Action: "s3:*"
            Resource: [!GetAtt EmailDocumentsBucket.Arn, !Sub "${EmailDocumentsBucket.Arn}/*"]
            Condition: { Bool: { "aws:SecureTransport": false } }

  MailingExportsBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketEncryption: { ServerSideEncryptionConfiguration: [{ ServerSideEncryptionByDefault: { SSEAlgorithm: AES256 } }] }
      PublicAccessBlockConfiguration: { BlockPublicAcls: true, IgnorePublicAcls: true, BlockPublicPolicy: true, RestrictPublicBuckets: true }
      VersioningConfiguration: { Status: Enabled }
      LifecycleConfiguration:
        Rules:
          - Id: AbortIncompleteUploads
            Status: Enabled
            AbortIncompleteMultipartUpload: { DaysAfterInitiation: 7 }
          - Id: RetainNoncurrentExports
            Status: Enabled
            NoncurrentVersionExpiration: { NoncurrentDays: 365 }

  MailingExportsBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref MailingExportsBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: DenyInsecureTransport
            Effect: Deny
            Principal: "*"
            Action: s3:*
            Resource: [!GetAtt MailingExportsBucket.Arn, !Sub "${MailingExportsBucket.Arn}/*"]
            Condition: { Bool: { "aws:SecureTransport": false } }

  BookkeepingIngestionSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub ${AWS::StackName}/bookkeeping/ingestion
      GenerateSecretString: { PasswordLength: 48, ExcludePunctuation: true }

  DataOpsTasksTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Sub ${AWS::StackName}-tasks
      BillingMode: PAY_PER_REQUEST
      SSESpecification:
        SSEEnabled: true
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
        - AttributeName: date
          AttributeType: S
        - AttributeName: status
          AttributeType: S
        - AttributeName: bundleId
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: GSI-Date
          KeySchema:
            - AttributeName: date
              KeyType: HASH
            - AttributeName: status
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: GSI-Bundle
          KeySchema:
            - AttributeName: bundleId
              KeyType: HASH
            - AttributeName: date
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: GSI-Status
          KeySchema:
            - AttributeName: status
              KeyType: HASH
            - AttributeName: date
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      Tags:
        - Key: Project
          Value: DataOps
        - Key: App
          Value: DataOpsV1
        - Key: DataClass
          Value: ExecutionState

  DataOpsBundlesTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Sub ${AWS::StackName}-bundles
      BillingMode: PAY_PER_REQUEST
      SSESpecification:
        SSEEnabled: true
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      Tags:
        - Key: Project
          Value: DataOps
        - Key: App
          Value: DataOpsV1
        - Key: DataClass
          Value: ExecutionState

  DataOpsTemplatesTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Sub ${AWS::StackName}-templates
      BillingMode: PAY_PER_REQUEST
      SSESpecification:
        SSEEnabled: true
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      Tags:
        - Key: Project
          Value: DataOps
        - Key: App
          Value: DataOpsV1
        - Key: DataClass
          Value: ExecutionState

  DataOpsUsersTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Sub ${AWS::StackName}-users
      BillingMode: PAY_PER_REQUEST
      SSESpecification:
        SSEEnabled: true
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      Tags:
        - Key: Project
          Value: DataOps
        - Key: App
          Value: DataOpsV1
        - Key: DataClass
          Value: ExecutionState

  DataOpsFilesTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Sub ${AWS::StackName}-files
      BillingMode: PAY_PER_REQUEST
      SSESpecification:
        SSEEnabled: true
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
        - AttributeName: taskId
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: GSI-Task
          KeySchema:
            - AttributeName: taskId
              KeyType: HASH
            - AttributeName: SK
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      Tags:
        - Key: Project
          Value: DataOps
        - Key: App
          Value: DataOpsV1
        - Key: DataClass
          Value: ExecutionState

  DataOpsArtifactsTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Sub ${AWS::StackName}-artifacts
      BillingMode: PAY_PER_REQUEST
      SSESpecification:
        SSEEnabled: true
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      Tags:
        - Key: Project
          Value: DataOps
        - Key: App
          Value: DataOpsV1
        - Key: DataClass
          Value: ExecutionState

  DataOpsAssistantJobsTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Sub ${AWS::StackName}-assistant-jobs
      BillingMode: PAY_PER_REQUEST
      SSESpecification:
        SSEEnabled: true
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      Tags:
        - Key: Project
          Value: DataOps
        - Key: App
          Value: DataOpsV1
        - Key: DataClass
          Value: ExecutionState

  DataOpsAuditEventsTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Sub ${AWS::StackName}-audit-events
      BillingMode: PAY_PER_REQUEST
      SSESpecification:
        SSEEnabled: true
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      TimeToLiveSpecification:
        AttributeName: expiresAt
        Enabled: true
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      Tags:
        - Key: Project
          Value: DataOps
        - Key: App
          Value: DataOpsV1
        - Key: DataClass
          Value: ExecutionState

  DataOpsIntakeTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Sub ${AWS::StackName}-intake
      BillingMode: PAY_PER_REQUEST
      SSESpecification:
        SSEEnabled: true
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
        - AttributeName: status
          AttributeType: S
        - AttributeName: updatedAt
          AttributeType: S
        - AttributeName: sourceMessageKey
          AttributeType: S
        - AttributeName: ownerStatusKey
          AttributeType: S
        - AttributeName: assigneeStatusKey
          AttributeType: S
        - AttributeName: assistantStatusKey
          AttributeType: S
        - AttributeName: followUpAt
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: GSI-Status
          KeySchema:
            - AttributeName: status
              KeyType: HASH
            - AttributeName: updatedAt
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: GSI-SourceMessage
          KeySchema:
            - AttributeName: sourceMessageKey
              KeyType: HASH
            - AttributeName: SK
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: GSI-OwnerStatus
          KeySchema:
            - AttributeName: ownerStatusKey
              KeyType: HASH
            - AttributeName: updatedAt
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: GSI-AssigneeStatus
          KeySchema:
            - AttributeName: assigneeStatusKey
              KeyType: HASH
            - AttributeName: updatedAt
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: GSI-AssistantStatus
          KeySchema:
            - AttributeName: assistantStatusKey
              KeyType: HASH
            - AttributeName: updatedAt
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: GSI-FollowUp
          KeySchema:
            - AttributeName: followUpAt
              KeyType: HASH
            - AttributeName: updatedAt
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      Tags:
        - Key: Project
          Value: DataOps
        - Key: App
          Value: DataOpsV1
        - Key: DataClass
          Value: ExecutionState

  DataOpsNotificationsTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Sub ${AWS::StackName}-notifications
      BillingMode: PAY_PER_REQUEST
      SSESpecification:
        SSEEnabled: true
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      Tags:
        - Key: Project
          Value: DataOps
        - Key: App
          Value: DataOpsV1
        - Key: DataClass
          Value: ExecutionState

  DataOpsSessionsTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Sub ${AWS::StackName}-sessions
      BillingMode: PAY_PER_REQUEST
      SSESpecification:
        SSEEnabled: true
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      Tags:
        - Key: Project
          Value: DataOps
        - Key: App
          Value: DataOpsV1
        - Key: DataClass
          Value: SessionState

  DataOpsExportArchiveBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      VersioningConfiguration:
        Status: Enabled
      LifecycleConfiguration:
        Rules:
          - Id: RetainPortableExecutionExports
            Status: Enabled
            Prefix: !Sub ${ExportArchivePrefix}/
            NoncurrentVersionExpirationInDays: !Ref ExportArchiveRetentionDays
      Tags:
        - Key: Project
          Value: DataOps
        - Key: App
          Value: DataOpsV1
        - Key: DataClass
          Value: ExecutionExportArchive
        - Key: BackupSelection
          Value: DataOpsV1ExecutionExports

  WorkEnginePortalSecret:
    Type: AWS::SecretsManager::Secret
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      Name: !Sub ${AWS::StackName}/work-engine/portal-secret
      GenerateSecretString:
        PasswordLength: 48
        ExcludePunctuation: true
      Tags:
        - Key: Project
          Value: DataOps
        - Key: App
          Value: DataOpsV1
        - Key: DataClass
          Value: PortalBrokerSecret

  BackendFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: makefile
    Properties:
      CodeUri: ..
      Runtime: nodejs24.x
      Handler: dist/handler.handler
      Timeout: 30
      MemorySize: 1024
      Policies:
        - Statement:
            Effect: Allow
            Action:
              - dynamodb:DeleteItem
              - dynamodb:GetItem
              - dynamodb:PutItem
              - dynamodb:Query
              - dynamodb:Scan
              - dynamodb:UpdateItem
              - dynamodb:TransactWriteItems
            Resource:
              - !GetAtt DataOpsTasksTable.Arn
              - !Sub ${DataOpsTasksTable.Arn}/index/*
              - !GetAtt DataOpsBundlesTable.Arn
              - !GetAtt DataOpsTemplatesTable.Arn
              - !GetAtt DataOpsUsersTable.Arn
              - !GetAtt DataOpsFilesTable.Arn
              - !Sub ${DataOpsFilesTable.Arn}/index/*
              - !GetAtt DataOpsArtifactsTable.Arn
              - !GetAtt DataOpsAssistantJobsTable.Arn
              - !GetAtt DataOpsAuditEventsTable.Arn
              - !GetAtt DataOpsIntakeTable.Arn
              - !Sub ${DataOpsIntakeTable.Arn}/index/*
              - !GetAtt DataOpsNotificationsTable.Arn
              - !GetAtt DataOpsSessionsTable.Arn
              - !GetAtt DataOpsBookkeepingTable.Arn
              - !GetAtt DataOpsSponsorCrmTable.Arn
              - !GetAtt DataOpsNewsletterSlotsTable.Arn
              - !Sub ${DataOpsNewsletterSlotsTable.Arn}/index/*
              - !GetAtt DataOpsCalendarTable.Arn
              - !Sub ${DataOpsCalendarTable.Arn}/index/*
        - Statement:
            Effect: Allow
            Action:
              - secretsmanager:GetSecretValue
            Resource:
              - !Sub arn:${AWS::Partition}:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${GitHubTokenSecretName}-*
              - !Ref WorkEnginePortalSecret
              - !Ref WorkEngineTypefullyApiTokenSecretArn
              - !Ref BookkeepingIngestionSecret
              - !Ref EmailDocumentIntakeSecretArn
        - Statement:
            Effect: Allow
            Action: [dynamodb:GetItem]
            Resource: !Ref DapierCredentialsTableArn
            Condition:
              ForAllValues:StringEquals:
                dynamodb:LeadingKeys: [mailchimp]
        - Statement:
            Effect: Allow
            Action:
              - s3:PutObject
            Resource:
              - !Sub ${DataOpsExportArchiveBucket.Arn}/${ExportArchivePrefix}/*
        - Statement:
            Effect: Allow
            Action: [s3:GetObject, s3:GetObjectVersion, s3:PutObject, s3:DeleteObject, s3:DeleteObjectVersion, s3:HeadObject]
            Resource: !Sub ${BookkeepingDocumentsBucket.Arn}/*
        - Statement:
            Effect: Allow
            Action: [s3:GetObject, s3:PutObject]
            Resource: !Sub ${MailingExportsBucket.Arn}/*
        - Statement:
            Effect: Allow
            Action: [s3:GetObject]
            Resource:
              - !Sub ${EmailDocumentsBucket.Arn}/${EmailDocumentSourcePrefix}*
              - !If
                - HasEmailDocumentExternalSource
                - !Sub arn:${AWS::Partition}:s3:::${EmailDocumentExternalSourceBucketName}/${EmailDocumentExternalSourcePrefix}*
                - !Ref AWS::NoValue
        - Statement:
            Effect: Allow
            Action: [s3:GetObject, s3:PutObject]
            Resource: !Sub ${EmailDocumentsBucket.Arn}/${EmailDocumentDestinationPrefix}*
        - Statement:
            Effect: Allow
            Action: [kms:Decrypt, kms:Encrypt, kms:GenerateDataKey]
            Resource:
              - !GetAtt BookkeepingDocumentsKey.Arn
              - !GetAtt EmailDocumentsKey.Arn
        - !If
          - HasEmailDocumentExternalSourceKms
          - Statement:
              Effect: Allow
              Action: [kms:Decrypt]
              Resource: !Ref EmailDocumentExternalSourceKmsKeyArn
          - !Ref AWS::NoValue
      Environment:
        Variables:
          DATAOPS_ENV: !Ref DataOpsEnvironment
          DATAOPS_TASKS_TABLE: !Ref DataOpsTasksTable
          DATAOPS_BUNDLES_TABLE: !Ref DataOpsBundlesTable
          DATAOPS_TEMPLATES_TABLE: !Ref DataOpsTemplatesTable
          DATAOPS_USERS_TABLE: !Ref DataOpsUsersTable
          DATAOPS_FILES_TABLE: !Ref DataOpsFilesTable
          DATAOPS_ARTIFACTS_TABLE: !Ref DataOpsArtifactsTable
          DATAOPS_ASSISTANT_JOBS_TABLE: !Ref DataOpsAssistantJobsTable
          DATAOPS_AUDIT_EVENTS_TABLE: !Ref DataOpsAuditEventsTable
          DATAOPS_INTAKE_TABLE: !Ref DataOpsIntakeTable
          DATAOPS_NOTIFICATIONS_TABLE: !Ref DataOpsNotificationsTable
          DATAOPS_SESSIONS_TABLE: !Ref DataOpsSessionsTable
          DATAOPS_BOOKKEEPING_TABLE: !Ref DataOpsBookkeepingTable
          DATAOPS_SPONSOR_CRM_TABLE: !Ref DataOpsSponsorCrmTable
          DATAOPS_NEWSLETTER_SLOTS_TABLE: !Ref DataOpsNewsletterSlotsTable
          DATAOPS_CALENDAR_TABLE: !Ref DataOpsCalendarTable
          NEWSLETTER_OPEN_ALERT_LEAD_DAYS: !Ref NewsletterOpenAlertLeadDays
          NEWSLETTER_WORKFLOW_ALERT_LEAD_DAYS: !Ref NewsletterWorkflowAlertLeadDays
          BOOKKEEPING_DOCUMENTS_BUCKET: !Ref BookkeepingDocumentsBucket
          BOOKKEEPING_DOCUMENTS_KMS_KEY: !GetAtt BookkeepingDocumentsKey.Arn
          BOOKKEEPING_INGESTION_SECRET_NAME: !Ref BookkeepingIngestionSecret
          DATAOPS_EXPORT_ARCHIVE_BUCKET: !Ref DataOpsExportArchiveBucket
          DATAOPS_EXPORT_ARCHIVE_PREFIX: !Ref ExportArchivePrefix
          GITHUB_OWNER: !Ref GitHubOwner
          GITHUB_REPO: !Ref GitHubRepo
          GITHUB_BRANCH: !Ref GitHubBranch
          GITHUB_TOKEN_SECRET_NAME: !Ref GitHubTokenSecretName
          AUTH_BASE_URL: !Ref AuthBaseUrl
          AUTH_USER_POOL_ID: !Ref AuthUserPoolId
          AUTH_ISSUER: !Ref AuthIssuer
          AUTH_JWKS_URL: !Ref AuthJwksUrl
          AUTH_CLIENT_ID: !Ref AuthClientId
          AUTH_CALLBACK_URL: !Ref AuthCallbackUrl
          AUTH_LOGOUT_URL: !Ref AuthLogoutUrl
          AUTH_SESSION_LIFETIME_SECONDS: !Ref AuthSessionLifetimeSeconds
          DATAOPS_DOCS_DOMAIN: "1"
          WORK_ENGINE_AUTH_MODE: portal
          WORK_ENGINE_PORTAL_SECRET_NAME: !Ref WorkEnginePortalSecret
          EMAIL_DOCUMENT_INTAKE_SECRET_NAME: !Ref EmailDocumentIntakeSecretArn
          EMAIL_DOCUMENTS_BUCKET: !Ref EmailDocumentsBucket
          EMAIL_DOCUMENTS_KMS_KEY: !GetAtt EmailDocumentsKey.Arn
          EMAIL_DOCUMENT_SOURCE_PREFIX: !Ref EmailDocumentSourcePrefix
          EMAIL_DOCUMENT_EXTERNAL_SOURCE_BUCKET: !Ref EmailDocumentExternalSourceBucketName
          EMAIL_DOCUMENT_EXTERNAL_SOURCE_PREFIX: !Ref EmailDocumentExternalSourcePrefix
          EMAIL_DOCUMENT_DESTINATION_PREFIX: !Ref EmailDocumentDestinationPrefix
          EMAIL_DOCUMENT_RECIPIENT_ROUTES: !Ref EmailDocumentRecipientRoutes
          EMAIL_DOCUMENT_RATE_LIMIT: !Ref EmailDocumentRateLimit
          DATAOPS_MAILING_EXPORTS_CONFIG: !Ref MailingExportsConfig
          DATAOPS_MAILING_EXPORTS_BUCKET: !Ref MailingExportsBucket
          DATAOPS_DAPIER_CREDENTIALS_TABLE: !Ref DapierCredentialsTableName
          TYPEFULLY_API_KEY_SECRET_NAME: !Ref WorkEngineTypefullyApiTokenSecretArn
          TYPEFULLY_SOCIAL_SET_ALEXEY: !Ref TypefullySocialSetAlexey
          TYPEFULLY_SOCIAL_SET_DATATALKSCLUB: !Ref TypefullySocialSetDataTalksClub
      FunctionUrlConfig:
        AuthType: NONE
        Cors:
          AllowCredentials: false
          AllowHeaders:
            - authorization
            - content-type
            - x-user-email
          AllowMethods:
            - GET
            - POST
            - PUT
            - DELETE
          AllowOrigins:
            - "*"
      Events:
        DailyBackendCron:
          Type: Schedule
          Properties:
            Description: Run DataOps recurring task and automatic template generation once per day.
            Schedule: cron(0 8 * * ? *)
            Enabled: true
        DailyBackendExport:
          Type: Schedule
          Properties:
            Description: Export DataOps execution data to the retained offsite archive bucket once per day.
            Schedule: cron(30 8 * * ? *)
            Enabled: true
            Input: '{"source":"aws.events","detail-type":"Scheduled Event","detail":{"dataopsAction":"export"}}'
        DailyMailingExport:
          Type: Schedule
          Properties:
            Description: Request or advance configured mailing-list exports once per day.
            Schedule: cron(0 9 * * ? *)
            Enabled: true
            Input: '{"source":"aws.events","detail-type":"Scheduled Event","detail":{"dataopsAction":"mailing-export"}}'

Outputs:
  DataOpsBookkeepingTableName:
    Value: !Ref DataOpsBookkeepingTable
  BookkeepingDocumentsBucketName:
    Value: !Ref BookkeepingDocumentsBucket
  EmailDocumentsBucketName:
    Description: Retained private transfer and managed email-document artifact bucket
    Value: !Ref EmailDocumentsBucket
  BackendUrl:
    Description: Protected DataOps v1 Lambda Function URL
    Value: !GetAtt BackendFunctionUrl.FunctionUrl
  DataOpsTasksTableName:
    Description: DynamoDB table for task and recurring execution state
    Value: !Ref DataOpsTasksTable
  DataOpsBundlesTableName:
    Description: DynamoDB table for workflow bundles
    Value: !Ref DataOpsBundlesTable
  DataOpsTemplatesTableName:
    Description: DynamoDB table for runtime template projections
    Value: !Ref DataOpsTemplatesTable
  DataOpsUsersTableName:
    Description: DynamoDB table for operator identities
    Value: !Ref DataOpsUsersTable
  DataOpsFilesTableName:
    Description: DynamoDB table for file metadata
    Value: !Ref DataOpsFilesTable
  DataOpsArtifactsTableName:
    Description: DynamoDB table for artifact metadata
    Value: !Ref DataOpsArtifactsTable
  DataOpsAssistantJobsTableName:
    Description: DynamoDB table for assistant job metadata
    Value: !Ref DataOpsAssistantJobsTable
  DataOpsAuditEventsTableName:
    Description: DynamoDB table for assistant job and workflow audit events
    Value: !Ref DataOpsAuditEventsTable
  DataOpsIntakeTableName:
    Description: DynamoDB table for raw operational intake metadata
    Value: !Ref DataOpsIntakeTable
  DataOpsNotificationsTableName:
    Description: DynamoDB table for reminders and notifications
    Value: !Ref DataOpsNotificationsTable
  DataOpsSessionsTableName:
    Description: DynamoDB table for session state
    Value: !Ref DataOpsSessionsTable
  DataOpsExportArchiveBucketName:
    Description: Retained S3 bucket for portable execution export archives
    Value: !Ref DataOpsExportArchiveBucket
  DataOpsExportArchivePrefix:
    Description: Prefix used for portable execution export archives
    Value: !Ref ExportArchivePrefix
  BackendFunctionName:
    Description: DataOps single backend Lambda function
    Value: !Ref BackendFunction
  BackendFunctionRoleArn:
    Description: Runtime role ARN for narrowly scoped cross-account source policies
    Value: !GetAtt BackendFunctionRole.Arn
  WorkEnginePortalSecretName:
    Description: Secret shared by the portal broker and private work engine
    Value: !Ref WorkEnginePortalSecret
  EmailDocumentIntakeSecretName:
    Description: Rotatable machine credential for versioned email document intake
    Value: !Ref EmailDocumentIntakeSecretArn
  WorkEngineTypefullyApiTokenSecretName:
    Description: Typefully API token secret consumed by the work engine for saved-draft creation
    Value: !Ref TypefullyApiTokenSecretName
